# sops configuration for this repository
# See: https://github.com/Mic92/sops-nix
#
# DeepSeek provides an Anthropic-compatible API at https://api.deepseek.com/anthropic
# No translation layer (claude-code-router) needed — Claude Code talks directly to it.

creation_rules:
  # Encrypt all .yaml files under secrets/ with your age public key
  # To add a new machine: add its public key below, then run:
  #   sops updatekeys secrets/claude-code.yaml
  - path_regex: secrets/.*\.yaml$
    age: >-
      age19q67d23zfzpx5hs0k4ff0nlwan52rzgff2sfqqp33hz2r0n6w9ssu6n5xr

# === New machine recovery ===
# You MUST have your age private key to decrypt secrets. Back it up!
#   ~/.config/sops/age/keys.txt
# Better: derive it from your SSH key so you only need to back up ~/.ssh:
#   nix shell nixpkgs#ssh-to-age -c ssh-to-age -private-key -i ~/.ssh/id_ed25519 -o ~/.config/sops/age/keys.txt
#
# To add a new machine's key:
#   1. On the new machine: cat ~/.config/sops/age/keys.txt | grep public | cut -d' ' -f4
#   2. Add that public key to the `age:` list above
#   3. From a machine that already has a key: sops updatekeys secrets/claude-code.yaml
#   4. git commit && git push, then git pull on the new machine
