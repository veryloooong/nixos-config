# sops configuration for this repository
# See: https://github.com/Mic92/sops-nix
#
# SSH-based: derive age key from your SSH key so you only back up ~/.ssh.
#   Regenerate anytime: ssh-to-age -private-key -i ~/.ssh/id_ed25519 \
#     -o ~/.config/sops/age/keys.txt

creation_rules:
  - path_regex: secrets/.*\.yaml$
    age: >-
      age1hpr5408nn02tfwh4cuv5l6y8hmvkhvyzy54thwa27d8mmykx39ns9f4qd2

# === Recovery (new machine) ===
# 1. Restore your SSH key (~/.ssh/id_ed25519) to the new machine
# 2. Regenerate the age key from it:
#      read -s SSH_TO_AGE_PASSPHRASE; export SSH_TO_AGE_PASSPHRASE
#      nix shell nixpkgs#ssh-toage -c ssh-to-age \
#        -private-key -i ~/.ssh/id_ed25519 \
#        -o ~/.config/sops/age/keys.txt
# 3. Clone repo, symlink, rebuild — no manual key management needed
#
# === Adding a second machine ===
# 1. On new machine, get its public key:
#      age-keygen -y ~/.config/sops/age/keys.txt
# 2. Add it here alongside the existing one (comma-separated):
#      age: >-
#        EXISTING_KEY,
#        NEW_KEY
# 3. Re-encrypt for both: sops updatekeys secrets/claude-code.yaml
# 4. Git commit, push, pull on the new machine
