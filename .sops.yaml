# sops configuration for this repository
# See: https://github.com/Mic92/sops-nix
#
# DeepSeek provides an Anthropic-compatible API at https://api.deepseek.com/anthropic
# No translation layer (claude-code-router) needed — Claude Code talks directly to it.

creation_rules:
  # Encrypt all .yaml files under secrets/ with your age public key
  - path_regex: secrets/.*\.yaml$
    age: >-
      age19q67d23zfzpx5hs0k4ff0nlwan52rzgff2sfqqp33hz2r0n6w9ssu6n5xr

# === Setup Instructions ===
#
# 1. Generate an age key (if you don't have one):
#      nix shell nixpkgs#age -c age-keygen -o ~/.config/sops/age/keys.txt
#
# 2. Get your public key:
#      cat ~/.config/sops/age/keys.txt | grep "public key" | cut -d' ' -f4
#
# 3. Replace YOUR_AGE_PUBLIC_KEY_HERE above with that public key.
#
# 4. Create and encrypt the secrets file:
#      cd ~/nix
#      nix shell nixpkgs#sops -c sops secrets/claude-code.yaml
#
#    In the opened editor, put:
#      deepseek-api-key: sk-your-deepseek-api-key-here
#
#    Save and exit — sops encrypts it automatically.
#
# 5. Rebuild:
#      sudo nixos-rebuild switch
